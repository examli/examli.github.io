<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title }} | {{ site.title }}</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="/assets/css/style.css">
  </head>
  <body>

    <header class="clean-header">
      <div class="header-container">
        <a href="/" class="site-logo">{{ site.title }}</a>
        <p class="site-bio">{{ site.description }}</p>
      </div>
    </header>

    <div class="clean-container">
      {{ content }}
    </div>

    <script>
      document.addEventListener('DOMContentLoaded', function () {
        const codeBlocks = document.querySelectorAll('.highlighter-rouge pre.highlight');

        codeBlocks.forEach(function (codeBlock) {
          // Create button element
          const button = document.createElement('button');
          button.className = 'copy-code-btn';
          button.type = 'button';
          button.innerText = 'Copy';

          // Insert button inside the container wrapper
          const container = codeBlock.closest('.highlighter-rouge');
          container.insertBefore(button, codeBlock);

          // Add click event listener
          button.addEventListener('click', function () {
            const codeText = codeBlock.querySelector('code').innerText;

            navigator.clipboard.writeText(codeText).then(function () {
              button.innerText = 'Copied!';
              button.classList.add('copied');

              // Reset button state after 2 seconds
              setTimeout(function () {
                button.innerText = 'Copy';
                button.classList.remove('copied');
              }, 2000);
            }).catch(function (error) {
              console.error('Failed to copy code: ', error);
              button.innerText = 'Error';
            });
          });
        });
      });
    </script>
    
  </body>
</html>
