<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title }} | {{ site.title }}</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="/assets/css/style.css">
  </head>
  <body>

    <header class="clean-header">
      <div class="header-container">
        <a href="/" class="site-logo">{{ site.title }}</a>
        <p class="site-bio">{{ site.description }}</p>
      </div>
    </header>

    <div class="clean-container">
      {{ content }}
    </div>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    // Thoda wait karke execute karenge taaki Jekyll code blocks poori tarah load ho jayein
    setTimeout(function() {
      const codeBlocks = document.querySelectorAll('div.highlighter-rouge, pre.highlight, figure.highlight');

      codeBlocks.forEach(function (block) {
        // Agar pehle se button nahi bana hai, tabhi banao
        if (block.querySelector('.copy-code-btn')) return;

        const button = document.createElement('button');
        button.className = 'copy-code-btn';
        button.type = 'button';
        button.innerText = 'Copy';

        // Block ko relative position do taaki button top-right mein tike
        block.style.position = 'relative';
        block.appendChild(button);

        button.addEventListener('click', function () {
          // Code text nikalne ka full-proof tareeka
          const codeElement = block.querySelector('code');
          if (!codeElement) return;
          
          const codeText = codeElement.innerText;

          navigator.clipboard.writeText(codeText).then(function () {
            button.innerText = 'Copied!';
            button.classList.add('copied');

            setTimeout(function () {
              button.innerText = 'Copy';
              button.classList.remove('copied');
            }, 2000);
          }).catch(function (err) {
            console.error('Copy failed: ', err);
          });
        });
      });
    }, 500);
  });
</script>
    
  </body>
</html>
