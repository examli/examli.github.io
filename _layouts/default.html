<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title }} | {{ site.title }}</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/examli/examli.github.io/refs/heads/main/byte.png">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/examli/examli.github.io/refs/heads/main/byte.png">
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#ffffff">
    <meta name="msapplication-navbutton-color" content="#ffffff">
    <meta name="apple-mobile-web-app-status-bar-style" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    {% seo %}
  </head>
  <body>

    <header class="clean-header">
      <div class="header-container">
        <a href="/" class="site-logo">{{ site.title }}</a>
        <p class="site-bio">{{ site.description }}</p>
      </div>
    </header>

    <div class="clean-container" style="padding-bottom: 0;">
      <input type="text" id="search-input" placeholder="Type to search posts..." autocomplete="off">
      <ul id="results-container"></ul>
    </div>

    <div class="clean-container">
      {{ content }}
    </div>

    <script>
      document.addEventListener('DOMContentLoaded', function () {
        const codeBlocks = document.querySelectorAll('div.highlighter-rouge');

        codeBlocks.forEach(function (block) {
          if (block.querySelector('.copy-code-btn')) return;

          const button = document.createElement('button');
          button.className = 'copy-code-btn';
          button.type = 'button';
          button.innerText = 'Copy';

          block.appendChild(button);

          button.addEventListener('click', function () {
            const codeElement = block.querySelector('code');
            if (!codeElement) return;
            
            const codeText = codeElement.innerText;

            navigator.clipboard.writeText(codeText).then(function () {
              button.innerText = 'Copied!';
              button.classList.add('copied');

              setTimeout(function () {
                button.innerText = 'Copy';
                button.classList.remove('copied');
              }, 2000);
            }).catch(function (err) {
              console.error('Copy failed: ', err);
            });
          });
        });
      });
    </script>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js').then(function(reg) {
            console.log('ServiceWorker registration successful with scope: ', reg.scope);
          }, function(err) {
            console.log('ServiceWorker registration failed: ', err);
          });
        });
      }
    </script>

    <script src="https://unpkg.com/simple-jekyll-search@latest/dest/simple-jekyll-search.min.js"></script>
    <script>
      window.simpleJekyllSearch = SimpleJekyllSearch({
        searchInput: document.getElementById('search-input'),
        resultsContainer: document.getElementById('results-container'),
        json: '/search.json',
        searchResultTemplate: '<li class="search-item"><span class="post-category">{category}</span><a href="{url}">{title}</a><span class="search-date">{date}</span></li>',
        noResultsText: '<li class="no-results">No posts found matching your query</li>',
        limit: 5
      });
    </script>
    
  </body>
</html>
