<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Examli</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #fafafa;
      color: #111;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      padding: 2rem 2.5rem;
      border-bottom: 1px solid #e5e5e5;
      display: flex;
      align-items: baseline;
      gap: 1rem;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    header p {
      font-size: 0.85rem;
      color: #888;
    }

    /* Main */
    main {
      flex: 1;
      padding: 3rem 2.5rem;
      max-width: 680px;
    }

    .label {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 1.2rem;
    }

    .subjects {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .subject {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.1rem 1.2rem;
      background: #fff;
      border: 1px solid #e8e8e8;
      text-decoration: none;
      color: #111;
      font-size: 1rem;
      font-weight: 500;
      transition: border-color 0.15s, background 0.15s;
      border-radius: 6px;
    }

    .subject:hover {
      border-color: #111;
      background: #f5f5f5;
    }

    .subject-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .subject-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .icon-db   { background: #eef2ff; }
    .icon-py   { background: #f0fdf4; }
    .icon-net  { background: #fff7ed; }
    .icon-xl   { background: #f0fdfa; }

    .subject-name { font-size: 0.97rem; }

    .subject-arrow {
      color: #bbb;
      font-size: 0.9rem;
      transition: transform 0.15s, color 0.15s;
    }
    .subject:hover .subject-arrow {
      transform: translateX(3px);
      color: #111;
    }

    /* Footer */
    footer {
      padding: 1.5rem 2.5rem;
      border-top: 1px solid #e5e5e5;
      font-size: 0.78rem;
      color: #bbb;
    }

    @media (max-width: 480px) {
      header, main, footer { padding-left: 1.25rem; padding-right: 1.25rem; }
      main { padding-top: 2rem; }
    }
  </style>
</head>
<body>

  <header>
    <h1>Examli</h1>
    <p>Last minute exam prep</p>
  </header>

  <main>
    <p class="label">Pick a subject</p>
    <div class="subjects">

      <a href="dbms" class="subject">
        <div class="subject-left">
          <div class="subject-icon icon-db">🗄️</div>
          <span class="subject-name">DBMS</span>
        </div>
        <span class="subject-arrow">→</span>
      </a>

      <a href="python" class="subject">
        <div class="subject-left">
          <div class="subject-icon icon-py">🐍</div>
          <span class="subject-name">Python</span>
        </div>
        <span class="subject-arrow">→</span>
      </a>

      <a href="cn" class="subject">
        <div class="subject-left">
          <div class="subject-icon icon-net">📡</div>
          <span class="subject-name">Communication Networks</span>
        </div>
        <span class="subject-arrow">→</span>
      </a>

      <a href="sp" class="subject">
        <div class="subject-left">
          <div class="subject-icon icon-xl">📊</div>
          <span class="subject-name">Spreadsheet</span>
        </div>
        <span class="subject-arrow">→</span>
      </a>

    </div>
  </main>

  <footer>© 2026 Examli</footer>

</body>
</html>
