---
layout: default
title: Home
---

<div class="clean-feed-layout">
  
  <div class="feed-header">
    <h1 class="feed-title">Latest Writing</h1>
  </div>

  <div class="posts-list">
    {% for post in site.posts %}
    <article class="clean-post-card">
      <div class="post-content">
        <span class="post-category">DEVLOG</span>
        <h2 class="post-title"><a href="{{ post.url }}">{{ post.title }}</a></h2>
        <div class="post-meta">
          <span>Sojwal Patil</span> — <span>{{ post.date | date: "%B %d, %Y" }}</span>
        </div>
      </div>
    </article>
    {% empty %}
    <p style="color: #666;">No posts found. Checking compiler routing...</p>
    {% endfor %}
  </div>

</div>
